<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Learning</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <ul class = "language">
        <li>Javascript</li>
    </ul>
</body>
<script>

    // add
    function addLanguage(langName) {
        const li = document.createElement("li");
        li.innerHTML = `${langName}`;
        document.querySelector(".language").appendChild(li);
        
    }

    addLanguage("Ruby");
    addLanguage("Go");

    function addOptimalLanguage(langName) {
        const li = document.createElement("li");
        li.appendChild(document.createTextNode(langName));
        document.querySelector(".language").appendChild(li);
    }

    addOptimalLanguage("Python");
    addOptimalLanguage("Java");


    //Edit
    const languages = document.querySelectorAll(".language li");
    languages.forEach((language) => {
        if (language.textContent === "Javascript") {
            language.textContent = "TypeScript";
        }
    });

</script>
</html>
